<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Login | MycsOnline</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="login-page">
  <section class="login-shell">
    <div class="login-left">
      <div class="brand"><span>MY</span><b>MycsOnline</b></div>
      <h1>Student sign in</h1>
      <p>Enter your registered email to access assigned courses.</p>

      <form id="studentLoginForm" class="form-card">
        <label>Email ID</label>
        <input id="studentEmail" type="email" placeholder="student@example.com" required />
        <button class="btn btn-primary full" type="submit">Continue</button>
        <p id="loginMessage" class="message"></p>
      </form>

      <a href="index.html" class="small-link">← Back to home</a>
    </div>
    <div class="login-right">
      <div class="big-icon">📚</div>
      <p>Secure access for enrolled students.</p>
    </div>
  </section>

  <script src="js/config.js"></script>
  <script src="js/supabase.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
